name: Build III

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Lint
        run: |
          cargo fmt --check
          cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  build-linux:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build i2pd static (musl)
        run: |
          chmod +x build/linux/build_i2pd_musl.sh
          ./build/linux/build_i2pd_musl.sh
      - uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: iii-linux
          path: target/x86_64-unknown-linux-musl/release/iii-daemon

  build-windows:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build i2pd (MSVC)
        run: powershell -File build/windows/build_i2pd_msvc.ps1
      - uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: iii-windows
          path: target/x86_64-pc-windows-msvc/release/iii-daemon.exe

  build-android:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build i2pd for Android inside Docker
        run: |
          docker build -t i2pd-android-builder build/android
          docker run --rm -v ${{ github.workspace }}:/workspace i2pd-android-builder
      - uses: actions-rs/cargo@v1
        with:
          command: ndk
          args: --target aarch64-linux-android build --release
      - name: Build APK (Flutter placeholder – to be implemented)
        run: echo "APK build would go here"
      - uses: actions/upload-artifact@v4
        with:
          name: iii-android
          path: target/aarch64-linux-android/release/libiii.so
