name: Android APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Rust Core (aarch64)
        run: |
          cargo ndk -t arm64-v8a build --release -p iii-ui

      - name: Package APK (Minimal Gradle Template)
        run: |
          mkdir -p build/outputs/apk/
          cp target/aarch64-linux-android/release/libiii_ui.so build/outputs/apk/III_v1.0_aarch64.so
          echo "Production libraries generated and ready for APK packaging."

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: III-Android-Production
          path: build/outputs/apk/
