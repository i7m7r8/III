[advisories]
db-urls = ["https://rustsec.org/advisories"]
vulnerability = "deny"
unmaintained = "deny"
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
unlicensed = "deny"
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "GPL-3.0-or-later"]
copyleft = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
